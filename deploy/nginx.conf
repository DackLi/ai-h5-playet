worker_processes  1;
error_log  /dianyi/log/h5-playlet/error.log;
pid        /dianyi/app/nginx.pid;
worker_rlimit_nofile 8192;

events {
  worker_connections  4096;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  log_format   main '$remote_addr - $remote_user [$time_local]  $status '
    '"$request" $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for"';
  sendfile     on;
  tcp_nopush   on;
  server_names_hash_bucket_size 128;

  # Gzip 压缩配置
  gzip_static on;
  gzip on;
  gzip_min_length 1k;
  gzip_buffers 4 16k;
  gzip_comp_level 2;
  gzip_types text/plain application/javascript application/x-javascript text/css application/json text/javascript application/xml image/svg+xml;
  gzip_vary off;
  gzip_disable "MSIE [1-6]\.";
  gzip_proxied any;

  client_max_body_size 100m;
  # 关闭 nginx 版本号显示
  server_tokens off;

  # Next.js 后端服务（standalone 模式）
  upstream nextjs_backend {
    server 127.0.0.1:8089;
    keepalive 64;
  }

  server {
    listen       80;
    access_log   /dianyi/log/h5-playlet/access.log  main;

    # Next.js 静态资源（_next/static）- 长期缓存
    location /_next/static/ {
      alias /dianyi/app/h5-playlet/.next/static/;
      expires 365d;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    # public 目录下的静态文件（图片、favicon 等）
    location /images/ {
      alias /dianyi/app/h5-playlet/public/images/;
      expires 30d;
      add_header Cache-Control "public";
      access_log off;
    }

    # 其他所有请求反向代理到 Next.js 服务
    location / {
      proxy_pass http://nextjs_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;

      # 超时配置
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }
  }
}
